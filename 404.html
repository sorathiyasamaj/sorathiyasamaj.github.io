<!doctype html>
<html lang="gu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming Soon | શ્રી નાગોર-ત્રંબૌ યદુવંશી સોરઠીયા આહિર સમાજ</title>
  <link rel="icon" href="assets/swastika.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/site/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Eczar:wght@700&family=Noto+Sans+Gujarati:wght@400;700&family=Yeseva+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory: #fff7e6;
      --marigold: #e8aa2e;
      --vermilion: #9f1d20;
      --wine: #4a1116;
    }
    body {
      background-color: var(--wine);
      background-image: 
        radial-gradient(circle at 20% 0%, rgba(232, 170, 46, .15), transparent 40rem),
        radial-gradient(circle at 80% 100%, rgba(232, 170, 46, .15), transparent 40rem);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans Gujarati', sans-serif;
      color: var(--ivory);
      margin: 0;
      overflow: hidden;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
      background: rgba(255, 247, 230, 0.05);
      border: 1px solid rgba(232, 170, 46, 0.2);
      border-radius: 2.5rem;
      backdrop-filter: blur(10px);
      max-width: 90%;
      width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      filter: drop-shadow(0 0 10px rgba(232, 170, 46, 0.5));
      animation: pulse 3s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    h1 {
      font-family: 'Yeseva One', serif;
      font-size: 3rem;
      color: var(--marigold);
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    p {
      font-size: 1.25rem;
      opacity: 0.9;
      line-height: 1.6;
    }
    .divider {
      height: 2px;
      width: 60px;
      background: var(--marigold);
      margin: 2rem auto;
      border-radius: 2px;
    }
    .social-notice {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--marigold);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/swastika.svg" alt="Logo" class="logo">
    <h1>Coming Soon</h1>
    <div class="divider"></div>
    <p>શ્રી નાગોર-ત્રંબૌ યદુવંશી સોરઠીયા આહિર સમાજ</p>
    <p class="mt-2 text-lg">૩૪મો સમૂહ લગ્નોત્સવ</p>
    <div class="social-notice">વેબસાઇટ પર કામ ચાલુ છે...</div>
  </div>
</body>
</html>
